# =============================================
# TUDOaqui SuperApp - Docker Compose Production
# =============================================
# Dominios:
#   tudoaqui.ao       -> Landing page / PWA App
#   app.tudoaqui.ao   -> PWA App (mesmo frontend)
#   api.tudoaqui.ao   -> Backend FastAPI
#   admin.tudoaqui.ao -> Admin Panel (mesmo frontend, rota /admin)
# =============================================

services:
  # === PostgreSQL ===
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tudoaqui
      POSTGRES_USER: tudoaqui_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tudoaqui_user -d tudoaqui"]
      interval: 10s
      timeout: 5s
      retries: 5

  # === Redis (rate limiter + cache) ===
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # === Backend FastAPI ===
  backend:
    build:
      context: ./backend
      dockerfile: ../deploy/Dockerfile.backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://tudoaqui_user:${DB_PASSWORD}@db:5432/tudoaqui
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: "false"
      CORS_ORIGINS: '["https://tudoaqui.ao","https://app.tudoaqui.ao","https://admin.tudoaqui.ao"]'
      AFRICASTALKING_API_KEY: ${AFRICASTALKING_API_KEY}
      AFRICASTALKING_USERNAME: ${AFRICASTALKING_USERNAME}
      AFRICASTALKING_SANDBOX: ${AFRICASTALKING_SANDBOX:-false}
      SMS_PROVIDER: africastalking
      SMS_SENDER: TUDOaqui
    expose:
      - "8000"

  # === Frontend (PWA App) ===
  frontend:
    build:
      context: ./frontend
      dockerfile: ../deploy/Dockerfile.frontend
      args:
        REACT_APP_BACKEND_URL: https://api.tudoaqui.ao
    restart: always
    expose:
      - "80"

  # === Nginx Reverse Proxy + SSL ===
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/sites:/etc/nginx/conf.d:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/lib/letsencrypt
      - webroot:/var/www/certbot
    depends_on:
      - backend
      - frontend

  # === Certbot (SSL) ===
  certbot:
    image: certbot/certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done'"

volumes:
  pgdata:
  redis_data:
  certbot-etc:
  certbot-var:
  webroot:
