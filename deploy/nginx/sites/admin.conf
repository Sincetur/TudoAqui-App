# ====================================
# admin.tudoaqui.ao
# Admin Panel (mesmo frontend, rota /admin)
# ====================================
server {
    listen 80;
    server_name admin.tudoaqui.ao;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name admin.tudoaqui.ao;

    ssl_certificate /etc/letsencrypt/live/tudoaqui.ao/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tudoaqui.ao/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # IP whitelist (opcional - descomentar para restringir acesso)
    # allow 1.2.3.4;
    # deny all;

    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
